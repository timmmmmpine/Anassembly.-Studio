<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — Architectural Work</title>
<meta name="description" content="A personal portfolio of architectural design work">
<style>
:root{
  --paper:   #fbfaf8;
  --ink:     #201f1d;
  --muted:   #8a8781;
  --line:    #eae7e1;
  --accent:  #6b6355;
  --f-heading: 'Trebuchet MS', 'Yu Gothic', 'Meiryo', sans-serif;
  --f-body:    'Yu Gothic Light', 'Yu Gothic', 'Meiryo', sans-serif;
}
*,*::before,*::after{ box-sizing:border-box; }
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:var(--f-body);
  font-weight:300;
  font-size:16px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
img{ max-width:100%; display:block; }
a{ color:inherit; text-decoration:none; }
button{ font-family:inherit; background:none; border:none; cursor:pointer; }
h1,h2,h3{ font-family:var(--f-heading); font-weight:700; letter-spacing:-0.01em; margin:0; }

@media (prefers-reduced-motion: reduce){
  *{ animation-duration:0.001ms !important; transition-duration:0.001ms !important; }
}
a:focus-visible, button:focus-visible{ outline:2px solid var(--accent); outline-offset:3px; }

.wrap{ max-width:1100px; margin:0 auto; padding:0 28px; }

/* ---------------- home hero — full-bleed rotating gallery ---------------- */
.home-hero{
  position:relative; width:100%; height:82vh; min-height:460px;
  overflow:hidden; background:#1c1b19; cursor:pointer;
}
.home-slides{ position:absolute; inset:0; }
.home-slide{ position:absolute; inset:0; opacity:0; transition:opacity 1.4s ease; }
.home-slide.active{ opacity:1; }
.home-slide img{ width:100%; height:100%; object-fit:cover; object-position: center; }
.placeholder-slide{
  display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg,#efece5,#ddd8cc);
  color:var(--muted); font-family:var(--f-heading); font-size:15px; letter-spacing:0.02em;
  text-align:center; padding:20px;
}

.home-caption-bl {
  position: absolute;
  left: 28px;
  bottom: 28px;
  z-index: 10;
  pointer-events: none;
}

.slide-caption {
  color: #fff;
  font-family: var(--f-heading);
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 0.02em;
  text-shadow: 0 1px 6px rgba(0, 0, 0, 0.8); 
  text-align: left;
}

.home-button-br {
  position: absolute;
  right: 28px;
  bottom: 28px;
  z-index: 10;
}

.home-view-all-btn {
  background: var(--paper);
  color: var(--ink);
  padding: 10px 22px;
  font-family: var(--f-heading);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.05em;
  border: 1px solid var(--line);
  border-radius: 4px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  transition: all 0.3s ease;
  display: inline-block;
}
.home-view-all-btn:hover {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.25);
}

@media (max-width:700px){
  .home-hero{ height:64vh; min-height:380px; }
  .home-caption-bl { left: 20px; bottom: 20px; }
  .home-button-br { right: 20px; bottom: 20px; }
  .slide-caption { font-size: 14px; }
  .home-view-all-btn { padding: 8px 16px; font-size: 12px; }
}

/* ---------------- work list ---------------- */
.work-list{ border-top:1px solid var(--line); }
.work-row{
  display:flex; align-items:center; gap:26px;
  padding:24px 4px; border-bottom:1px solid var(--line);
  cursor:pointer; transition:background .2s ease;
}
.work-row:hover{ background:rgba(32,31,29,0.035); }
.work-year{ width:56px; flex-shrink:0; font-family:var(--f-heading); font-size:14px; color:var(--muted); }
.work-thumb{ width:130px; aspect-ratio:4/3; flex-shrink:0; overflow:hidden; border-radius:4px; background:#efece5; }
.work-thumb img{ width:100%; height:100%; object-fit:cover; transition:transform .4s ease; }
.work-row:hover .work-thumb img{ transform:scale(1.04); }
.work-title-wrap{ flex:1; min-width:0; }
.work-title{ font-size:21px; margin-bottom:4px; }
.work-meta{ color:var(--muted); font-size:13px; }
@media (max-width:600px){
  .work-row{ gap:16px; }
  .work-thumb{ width:88px; }
  .work-title{ font-size:17px; }
  .work-year{ width:40px; font-size:12.5px; }
}

/* header */
.site-header{ padding:36px 0 20px; }
.header-row{ display:flex; justify-content:space-between; align-items:baseline; flex-wrap:wrap; gap:16px; }
.site-title{ font-size:22px; font-family:var(--f-heading); font-weight:700; }
.nav-links{ display:flex; gap:28px; font-size:14px; color:var(--muted); }
.nav-links a:hover{ color:var(--ink); }

/* category filter */
.filters{
  display:flex; gap:22px; flex-wrap:wrap;
  padding:18px 0 26px;
  border-bottom:1px solid var(--line);
  font-size:14px;
}
.filters button{ color:var(--muted); padding:2px 0; border-bottom:1px solid transparent; }
.filters button:hover{ color:var(--ink); }
.filters button.active{ color:var(--ink); border-color:var(--ink); }

/* intro */
.intro{ padding:44px 0 8px; max-width:560px; }
.intro h1{ font-size:34px; line-height:1.25; margin-bottom:14px; }
.intro p{ color:var(--muted); font-size:15.5px; }

/* grid */
.grid-section{ padding:44px 0 90px; }
.grid{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:52px 40px;
}
@media (max-width:700px){ .grid{ grid-template-columns:1fr; gap:40px; } }

.card{ cursor:pointer; }
.card-thumb{
  aspect-ratio:4/3; width:100%; overflow:hidden;
  border-radius:6px; margin-bottom:16px; background:#efece5;
}
.card-thumb img{ width:100%; height:100%; object-fit:cover; transition:transform .4s ease; }
.card:hover .card-thumb img{ transform:scale(1.03); }
.placeholder{
  width:100%; height:100%; display:flex; align-items:center; justify-content:center;
  color:var(--muted); font-size:13px; background:#efece5; text-align:center; padding:10px;
}
.card-title{ font-size:20px; margin-bottom:4px; }
.card-meta{ color:var(--muted); font-size:13.5px; }

.empty-state{ padding:60px 0; text-align:center; color:var(--muted); }

/* detail */
.detail{ padding:36px 0 100px; }
.back-link{ display:inline-block; color:var(--muted); font-size:14px; margin-bottom:32px; }
.back-link:hover{ color:var(--ink); }

.detail-title{ font-size:clamp(30px,5vw,46px); line-height:1.15; margin-bottom:10px; }
.detail-meta{ color:var(--muted); font-size:14.5px; margin-bottom:32px; }
.detail-meta > *:not(:last-child)::after{ content:"  ·  "; white-space: pre; }

.meta-link {
  color: var(--muted);
  border-bottom: 1px solid transparent;
  transition: color 0.2s ease, border-color 0.2s ease;
}
.meta-link:hover {
  color: var(--ink);
  border-color: var(--ink);
}

.detail-hero{
  aspect-ratio:16/9; width:100%; overflow:hidden; border-radius:8px;
  background:#efece5; margin-bottom:44px;
}
.detail-hero img{ width:100%; height:100%; object-fit:cover; }

.detail-body{ display:grid; grid-template-columns:2.2fr 1fr; gap:60px; max-width:980px; }
@media (max-width:800px){ .detail-body{ grid-template-columns:1fr; gap:28px; } }
.detail-desc p{ margin:0 0 18px; color:#3a3833; font-size:16.5px; line-height:1.8; }
.side-info{ font-size:14px; color:var(--muted); line-height:1.9; }
.side-info strong{ display:block; color:var(--ink); font-size:13px; margin:22px 0 4px; }
.side-info strong:first-child{ margin-top:0; }

.project-gallery{ margin-top:56px; }
.project-gallery h3{ font-size:18px; margin-bottom:20px; color:var(--muted); font-weight:400; }

/* gallery */
.gallery-grid{
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-auto-rows: 190px;
  gap: 12px;
}
.gallery-item{
  overflow:hidden; border-radius:4px; background:#efece5;
  cursor:zoom-in; position:relative;
}
.gallery-item img{
  width:100%; height:100%; object-fit:cover; display:block;
  transition:transform .4s ease;
}
.gallery-item:hover img{ transform:scale(1.045); }
.gallery-item.large{ grid-column: span 2; grid-row: span 2; }
.gallery-item.small{ grid-column: span 1; grid-row: span 1; }

@media (max-width: 750px) {
  .gallery-grid{ grid-template-columns: repeat(2, 1fr); grid-auto-rows: 160px; }
}
@media (max-width: 500px) {
  .gallery-grid{ grid-template-columns: 1fr; grid-auto-rows: 220px; }
  .gallery-item.large{ grid-column: span 1; grid-row: span 2; }
}

/* lightbox */
.lightbox-overlay{
  position:fixed; inset:0; background:rgba(20,19,17,0.94);
  display:none; align-items:center; justify-content:center;
  z-index:1000; padding:48px; cursor:zoom-out;
}
.lightbox-overlay.active{ display:flex; }
.lightbox-overlay img{
  max-width:100%; max-height:100%; width:auto; height:auto;
  object-fit:contain; border-radius:4px; box-shadow:0 10px 40px rgba(0,0,0,0.45);
  cursor:default;
}
.lightbox-close{
  position:absolute; top:24px; right:28px; color:#fff; font-size:32px;
  line-height:1; background:none; border:none; cursor:pointer; opacity:0.85;
}
.lightbox-close:hover{ opacity:1; }
.lightbox-nav{
  position:absolute; top:50%; transform:translateY(-50%); color:#fff;
  font-size:26px; background:rgba(255,255,255,0.1); border:none;
  width:48px; height:48px; border-radius:50%; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background .2s ease;
}
.lightbox-nav:hover{ background:rgba(255,255,255,0.2); }
.lightbox-prev{ left:20px; }
.lightbox-next{ right:20px; }
.lightbox-counter{
  position:absolute; bottom:22px; left:50%; transform:translateX(-50%);
  color:rgba(255,255,255,0.75); font-size:13px; letter-spacing:0.04em;
}
.lightbox-pdf-viewer{
  display:none; align-items:center; justify-content:center;
  position:relative;
}
.lightbox-pdf-viewer canvas{
  display:block; background:#fff; border-radius:2px;
  box-shadow:0 10px 40px rgba(0,0,0,0.45);
  transition:opacity .2s ease;
}
.lightbox-pdf-viewer.loading canvas{ opacity:0.35; }
.lightbox-pdf-loading{
  display:none; position:absolute; color:rgba(255,255,255,0.85);
  font-size:13px; letter-spacing:0.04em; font-family:var(--f-heading);
}
.lightbox-pdf-viewer.loading .lightbox-pdf-loading{ display:block; }
.lightbox-pdf-error{
  display:none; color:rgba(255,255,255,0.85); font-size:14px;
  text-align:center; max-width:320px; line-height:1.7;
}
.lightbox-pdf-error a{ color:#fff; border-bottom:1px solid rgba(255,255,255,0.5); }
@media (max-width:600px){
  .lightbox-overlay{ padding:16px; }
  .lightbox-nav{ width:40px; height:40px; font-size:22px; }
  .lightbox-close{ top:14px; right:16px; font-size:26px; }
}

.more-work{ margin-top:90px; padding-top:34px; border-top:1px solid var(--line); }
.more-work h3{ font-size:20px; margin-bottom:22px; }

/* about */
.about{ padding:50px 0 100px; max-width:850px; }
.about h1{ font-size:36px; margin-bottom:22px; }
.about p{ color:#3a3833; font-size:16px; line-height:1.8; margin:0 0 16px; }
.about .contact{ margin-top:28px; font-size:14.5px; color:var(--muted); }
.about .contact a{ color:var(--ink); border-bottom:1px solid var(--line); }
.about .contact a:hover{ border-color:var(--ink); }

/* books */
.book-grid{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:36px 28px;
}
@media (max-width:820px){ .book-grid{ grid-template-columns:repeat(3,1fr); } }
@media (max-width:560px){ .book-grid{ grid-template-columns:repeat(2,1fr); gap:28px 18px; } }

.book-card{ }
.book-cover{
  aspect-ratio:2/3; width:100%; overflow:hidden;
  border-radius:4px; margin-bottom:12px; background:#efece5;
  box-shadow:0 1px 2px rgba(32,31,29,0.08);
}
.book-cover img{ width:100%; height:100%; object-fit:cover; transition:opacity .25s ease; }
.book-cover.book-cover-clickable{ cursor:zoom-in; }
.book-cover.book-cover-clickable:hover img{ opacity:0.92; }
.book-title{ font-size:14.5px; line-height:1.35; margin-bottom:3px; }
.book-meta{ color:var(--muted); font-size:12.5px; margin-bottom:6px; }
.book-link{ font-size:12.5px; color:var(--accent); border-bottom:1px solid var(--line); }
.book-link:hover{ border-color:var(--accent); }

.related-books{ margin-top:56px; }
.related-books h3{ font-size:18px; margin-bottom:20px; }

/* footer */
.site-footer{
  border-top:1px solid var(--line);
  padding:24px 0; color:var(--muted); font-size:13px;
}
</style>
</head>

<header class="site-header">
  <div class="wrap header-row">
    <a href="#/" class="site-title">Anassembly. Studio</a>

      <a href="#/work">Work</a>

  <button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="Next image">&#8250;</button>

</div>

const app = document.getElementById("app");

function categories(){
  const list = [];
  PROJECTS.forEach(p => { if(!list.includes(p.category)) list.push(p.category); });
  return list;
}

function esc(str){
  return String(str).replace(/[&<>"']/g, s => ({
    "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;"
  }[s]));
}

function thumb(p){
  if(p.cover){
    return `<div class="card-thumb"><img src="${esc(p.cover)}" alt="${esc(p.title)}" loading="lazy"></div>`;
  }
  return `<div class="card-thumb"><div class="placeholder">Image coming soon</div></div>`;
}

function bookCover(b){
  if(b.cover){
    const clickable = b.file ? " book-cover-clickable" : "";
    const attrs = b.file ? ` data-pdf-src="${esc(b.file)}" data-book-title="${esc(b.title)}"` : "";
    return `<div class="book-cover${clickable}"${attrs}><img src="${esc(b.cover)}" alt="${esc(b.title)} cover" loading="lazy"></div>`;
  }
  return `<div class="book-cover"><div class="placeholder">Cover coming soon</div></div>`;
}

function bookCardHtml(b){
  return `
    <div class="book-card">
      ${bookCover(b)}
      <h3 class="book-title">${esc(b.title)}</h3>
      <p class="book-meta">${esc(b.year)}</p>
    </div>
  `;
}

function booksForProject(project){
  const ids = project.books || [];
  return BOOKS.filter(b => ids.includes(b.id));
}

let currentCategory = "All";
let currentYearFilter = null; 
let homeSlideTimer = null;

function collectHomeSlides(){
  const slides = [];
  PROJECTS.forEach(p => {
    if(p.cover) slides.push({ type:"image", src:p.cover, alt:p.title, id: p.id });
  });
  if(!slides.length){
    PROJECTS.slice(0, 8).forEach(p => slides.push({ type:"placeholder", label:p.title, id: p.id }));
  }
  return slides;
}

function stopHomeSlideshow(){
  if(homeSlideTimer){ clearInterval(homeSlideTimer); homeSlideTimer = null; }
}

function startHomeSlideshow(){
  stopHomeSlideshow();
  const slides = document.querySelectorAll("#homeHero .home-slide");
  const captionEl = document.getElementById("slideCaption");
  if(slides.length <= 1) return;
  let idx = 0;
  homeSlideTimer = setInterval(() => {
    slides[idx].classList.remove("active");
    idx = (idx + 1) % slides.length;
    slides[idx].classList.add("active");
    if(captionEl && slides[idx].dataset.title){
      captionEl.textContent = slides[idx].dataset.title;
    }
  }, 4000);
}

function renderFilters(){
  const cats = ["All", ...categories()];
  const html = cats.map(c => {
    const active = (c === currentCategory && !currentYearFilter) ? "active" : "";
    return `<button class="${active}" data-cat="${esc(c)}">${esc(c)}</button>`;
  }).join("");
  return `<div class="filters">${html}</div>`;
}

function attachFilterEvents(){
  document.querySelectorAll(".filters button").forEach(btn => {
    btn.addEventListener("click", () => {
      currentYearFilter = null; 
      currentCategory = btn.dataset.cat;
      location.hash = currentCategory === "All" ? "#/work" : "#/category/" + encodeURIComponent(currentCategory);
    });
  });
}

function filteredProjects(){
  if (currentYearFilter) {
    return PROJECTS.filter(p => p.year === currentYearFilter);
  }
  return PROJECTS.filter(p => currentCategory === "All" || p.category === currentCategory);
}

/* ============================================================
   LIGHTBOX LOGIC
   ============================================================ */
let lightboxImages = [];
let lightboxIndex = 0;

const lightboxEl = document.getElementById("lightbox");
const lightboxImgEl = document.getElementById("lightboxImg");
const lightboxPdfViewerEl = document.getElementById("lightboxPdfViewer");
const lightboxPdfCanvasEl = document.getElementById("lightboxPdfCanvas");
const lightboxPdfErrorEl = document.getElementById("lightboxPdfError");
const lightboxPdfErrorLinkEl = document.getElementById("lightboxPdfErrorLink");
const lightboxCounterEl = document.getElementById("lightboxCounter");
const lightboxPrevBtn = document.getElementById("lightboxPrev");
const lightboxNextBtn = document.getElementById("lightboxNext");

/* PDF 頁面渲染狀態（用 canvas 自行畫出每一頁，取代瀏覽器原生 PDF 介面） */
let pdfDoc = null;
let pdfPageNum = 1;
let pdfPageCount = 0;
let pdfRenderId = 0;
let pdfLoadId = 0;

function openLightbox(images, index){
  lightboxImages = images;
  lightboxIndex = index;
  updateLightbox();
  lightboxEl.classList.add("active");
  lightboxEl.setAttribute("aria-hidden", "false");
  document.body.style.overflow = "hidden";
}

function closeLightbox(){
  lightboxEl.classList.remove("active");
  lightboxEl.setAttribute("aria-hidden", "true");
  document.body.style.overflow = "";
  pdfDoc = null;
  pdfLoadId++;
  pdfRenderId++;
}

function updateLightbox(){
  const item = lightboxImages[lightboxIndex];
  const isPdf = item.type === "pdf";

  lightboxImgEl.style.display = isPdf ? "none" : "block";
  lightboxPdfViewerEl.style.display = isPdf ? "flex" : "none";
  lightboxPdfErrorEl.style.display = "none";

  if(isPdf){
    lightboxImgEl.src = "";
    loadPdfDocument(item.src);
  } else {
    pdfDoc = null;
    pdfLoadId++;
    pdfRenderId++;
    lightboxImgEl.src = item.src;
    lightboxImgEl.alt = item.alt || "";
    updateLightboxNav();
  }
}

/* 依目前是在看圖片組還是 PDF 頁面，決定計數器與上一頁/下一頁按鈕的顯示方式 */
function updateLightboxNav(){
  const item = lightboxImages[lightboxIndex];
  const isPdf = item.type === "pdf";

  if(isPdf){
    const multiPage = pdfPageCount > 1;
    lightboxPrevBtn.style.display = multiPage ? "flex" : "none";
    lightboxNextBtn.style.display = multiPage ? "flex" : "none";
    lightboxCounterEl.textContent = pdfPageCount ? `${pdfPageNum} / ${pdfPageCount}` : "";
  } else {
    const multi = lightboxImages.length > 1;
    lightboxPrevBtn.style.display = multi ? "flex" : "none";
    lightboxNextBtn.style.display = multi ? "flex" : "none";
    lightboxCounterEl.textContent = multi ? `${lightboxIndex + 1} / ${lightboxImages.length}` : "";
  }
}

async function loadPdfDocument(src){
  const loadId = ++pdfLoadId;
  pdfDoc = null;
  pdfPageNum = 1;
  pdfPageCount = 0;
  lightboxPdfViewerEl.classList.add("loading");
  updateLightboxNav();

  if(!window.pdfjsLib){
    lightboxPdfViewerEl.classList.remove("loading");
    showPdfError(src, "PDF 元件載入失敗（pdf.js 未載入，請確認網路連線）");
    return;
  }
  try{
    // encodeURI 避免路徑中的中文檔名或空白造成讀取失敗
    const doc = await pdfjsLib.getDocument(encodeURI(src)).promise;
    if(loadId !== pdfLoadId) return; // 使用者已切換到別的項目
    pdfDoc = doc;
    pdfPageCount = doc.numPages;
    renderPdfPage(1);
  }catch(err){
    if(loadId !== pdfLoadId) return;
    console.warn("PDF 載入失敗：", src, err);
    lightboxPdfViewerEl.classList.remove("loading");
    showPdfError(src, (err && err.message) ? err.message : String(err));
  }
}

function showPdfError(src, reason){
  lightboxPdfErrorEl.style.display = "block";
  lightboxPdfErrorLinkEl.href = src;
  const reasonEl = document.getElementById("lightboxPdfErrorReason");
  if(reasonEl) reasonEl.textContent = reason || "";
}

async function renderPdfPage(num){
  if(!pdfDoc) return;
  const renderId = ++pdfRenderId;
  lightboxPdfViewerEl.classList.add("loading");
  try{
    const page = await pdfDoc.getPage(num);
    if(renderId !== pdfRenderId) return;
    const unscaled = page.getViewport({ scale: 1 });
    const maxW = Math.min(window.innerWidth * 0.9, 1000);
    const maxH = window.innerHeight * 0.84;
    const fitScale = Math.min(maxW / unscaled.width, maxH / unscaled.height);
    const outputScale = window.devicePixelRatio || 1;
    const viewport = page.getViewport({ scale: fitScale });

    const canvas = lightboxPdfCanvasEl;
    canvas.width = Math.floor(viewport.width * outputScale);
    canvas.height = Math.floor(viewport.height * outputScale);
    canvas.style.width = viewport.width + "px";
    canvas.style.height = viewport.height + "px";
    const ctx = canvas.getContext("2d");
    const transform = outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : undefined;

    await page.render({ canvasContext: ctx, viewport, transform }).promise;
    if(renderId !== pdfRenderId) return;

    pdfPageNum = num;
    lightboxPdfViewerEl.classList.remove("loading");
    updateLightboxNav();
  }catch(err){
    if(renderId !== pdfRenderId) return;
    console.warn("PDF 頁面渲染失敗：", err);
    lightboxPdfViewerEl.classList.remove("loading");
  }
}

function lightboxPrev(){
  const item = lightboxImages[lightboxIndex];
  if(item.type === "pdf" && pdfPageCount > 1){
    const prevPage = pdfPageNum > 1 ? pdfPageNum - 1 : pdfPageCount;
    renderPdfPage(prevPage);
    return;
  }
  lightboxIndex = (lightboxIndex - 1 + lightboxImages.length) % lightboxImages.length;
  updateLightbox();
}

function lightboxNext(){
  const item = lightboxImages[lightboxIndex];
  if(item.type === "pdf" && pdfPageCount > 1){
    const nextPage = pdfPageNum < pdfPageCount ? pdfPageNum + 1 : 1;
    renderPdfPage(nextPage);
    return;
  }
  lightboxIndex = (lightboxIndex + 1) % lightboxImages.length;
  updateLightbox();
}

lightboxEl.addEventListener("click", (e) => {
  if(e.target === lightboxEl) closeLightbox();
});
document.getElementById("lightboxClose").addEventListener("click", closeLightbox);
lightboxPrevBtn.addEventListener("click", lightboxPrev);
lightboxNextBtn.addEventListener("click", lightboxNext);
document.addEventListener("keydown", (e) => {
  if(!lightboxEl.classList.contains("active")) return;
  if(e.key === "Escape") closeLightbox();
  if(e.key === "ArrowLeft") lightboxPrev();
  if(e.key === "ArrowRight") lightboxNext();
});

window.addEventListener("hashchange", route);
route();
</script>
